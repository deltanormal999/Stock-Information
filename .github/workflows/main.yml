name: TEST - Every 15 Minutes (delete this file once confirmed working)

on:
  schedule:
    # 5-minute intervals are the documented floor but are the least reliable in
    # practice (GitHub explicitly warns short intervals get delayed/dropped
    # more often under load). 15 minutes is much more consistently honored.
    - cron: "10 4 * * *"
  workflow_dispatch: {}   # also allows a manual run, useful to sanity-check right away

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strategy and send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python nifty_mean_reversion.py

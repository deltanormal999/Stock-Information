services:
  - type: cron
    name: nifty-mean-reversion
    runtime: python
    plan: starter
    schedule: "30 12 * * 1-5"   # 6:00 PM IST, Mon-Fri (Render schedules run in UTC)
    buildCommand: pip install -r requirements.txt
    startCommand: python nifty_mean_reversion.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
